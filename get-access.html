<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Access — CampusRide NIT AP</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #050A05;
  --bg2: #0A120A;
  --bg3: #0F1F0F;
  --card: #0D1A0D;
  --card2: #162416;
  --accent: #22C55E;
  --accent2: #4ADE80;
  --teal: #86EFAC;
  --blue: #FFFFFF;
  --red: #FF4757;
  --text: #F0FFF0;
  --muted: #6B8F6B;
  --border: rgba(255,255,255,0.07);
}
html, body { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  overflow-x: hidden;
}

.left-panel {
  width: 52%;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 4rem 5rem;
  position: relative;
  overflow: hidden;
}
.left-bg {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 60% at 20% 20%, rgba(34,197,94,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 80%, rgba(0,212,170,0.08) 0%, transparent 60%);
}
.left-grid {
  position: absolute; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 40%, transparent 100%);
}
.left-content { position: relative; z-index: 1; }
.brand {
  font-family: 'Syne', sans-serif;
  font-size: 1.4rem; font-weight: 800;
  margin-bottom: 3rem; color: var(--text);
}
.brand span { color: var(--accent); }
.left-heading {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2rem, 3.5vw, 3rem);
  font-weight: 800; line-height: 1.1;
  margin-bottom: 1rem;
}
.left-heading em { font-style: normal; color: var(--accent); }
.left-sub {
  font-size: 1rem; color: var(--muted); line-height: 1.7;
  max-width: 380px; margin-bottom: 2.5rem;
}
.feature-list { display: flex; flex-direction: column; gap: 1rem; }
.feat-row {
  display: flex; align-items: center; gap: 14px;
  opacity: 0; transform: translateX(-20px);
  animation: slideIn 0.5s ease forwards;
}
.feat-row:nth-child(1) { animation-delay: 0.1s; }
.feat-row:nth-child(2) { animation-delay: 0.2s; }
.feat-row:nth-child(3) { animation-delay: 0.3s; }
.feat-row:nth-child(4) { animation-delay: 0.4s; }
.feat-row:nth-child(5) { animation-delay: 0.5s; }
.feat-ico {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 1rem;
}
.feat-row-text h4 { font-weight: 600; font-size: 0.9rem; }
.feat-row-text p { font-size: 0.8rem; color: var(--muted); }
.testimonial {
  margin-top: 3rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 1.25rem 1.4rem;
  opacity: 0; animation: slideIn 0.5s 0.6s ease forwards;
}
.test-quote { font-size: 0.9rem; color: var(--muted); line-height: 1.65; font-style: italic; }
.test-author {
  display: flex; align-items: center; gap: 10px; margin-top: 1rem;
}
.test-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700; color: #fff;
}
.test-name { font-size: 0.82rem; font-weight: 600; }
.test-role { font-size: 0.75rem; color: var(--muted); }

.right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 3rem 2.5rem;
}
.form-box {
  width: 100%; max-width: 420px;
  animation: fadeUp 0.5s ease both;
}
.form-box h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1.6rem; font-weight: 800;
  margin-bottom: 0.35rem;
}
.form-box .sub {
  font-size: 0.875rem; color: var(--muted); margin-bottom: 2rem;
}

.tabs {
  display: flex; gap: 0; background: var(--bg3);
  border-radius: 10px; padding: 4px; margin-bottom: 1.75rem;
}
.tab {
  flex: 1; padding: 0.55rem; border-radius: 8px; border: none;
  background: transparent; color: var(--muted); font-size: 0.875rem;
  font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}
.tab.active {
  background: var(--card2); color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

.form-group { margin-bottom: 1rem; }
.form-label {
  display: block; font-size: 0.78rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
}
.form-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 0.7rem 1rem; border-radius: 11px;
  font-size: 0.9rem; font-family: 'DM Sans', sans-serif; outline: none;
}
.email-wrap { position: relative; }
.email-domain {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font-size: 0.82rem; color: var(--teal); font-weight: 600;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

.btn-main {
  width: 100%; background: linear-gradient(135deg, var(--accent) 0%, #16A34A 100%);
  color: #fff; border: none; padding: 0.85rem; border-radius: 12px;
  font-size: 1rem; font-weight: 700; cursor: pointer;
}

#login-form { display: none; }

@keyframes slideIn {
  to { opacity: 1; transform: translateX(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="left-panel">
  <div class="left-bg"></div>
  <div class="left-grid"></div>
  <div class="left-content">
    <div class="brand">Campus<span>Ride</span></div>
    <h2 class="left-heading">Your campus.<br>Your <em>community.</em></h2>
    <p class="left-sub">Join NIT AP's student mobility platform.</p>
  </div>
</div>

<div class="right-panel">
  <div class="form-box">
    <h2>Get Access</h2>

    <div class="tabs">
      <button class="tab active" onclick="showTab('signup', this)">Create Account</button>
      <button class="tab" onclick="showTab('login', this)">Sign In</button>
    </div>

    <div id="signup-form">
      <input class="form-input" placeholder="First Name"><br><br>
      <button class="btn-main" onclick="goToVerify()">Continue →</button>
    </div>

    <div id="login-form">
      <input class="form-input" placeholder="Email"><br><br>
      <button class="btn-main">Login →</button>
    </div>

  </div>
</div>

<script>
function showTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'signup') {
    document.getElementById('signup-form').style.display = 'block';
    document.getElementById('login-form').style.display = 'none';
  } else {
    document.getElementById('signup-form').style.display = 'none';
    document.getElementById('login-form').style.display = 'block';
  }
}
function goToVerify() {
  window.location.href = 'verify-join.html';
}
</script>

</body>
</html>
